<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizofy Admin - API Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0713;
            --card-bg: rgba(20, 15, 30, 0.6);
            --border-color: rgba(139, 92, 246, 0.15);
            --border-glow: rgba(139, 92, 246, 0.3);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            --button-glow: rgba(236, 72, 153, 0.4);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e1136 0%, var(--bg-color) 70%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 2.5rem; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 0.5rem; }
        .logo-icon { width: 42px; height: 42px; background: var(--primary-gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--button-glow); }
        .logo-icon svg { fill: white; width: 22px; height: 22px; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { color: var(--text-secondary); font-size: 1.05rem; margin-top: 0.25rem; font-weight: 300; }

        main { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 2rem; }
        .card { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: 24px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .status-container { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1.25rem; }
        .status-header { display: flex; align-items: center; justify-content: space-between; }
        .status-title { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 600; }
        .badge { font-size: 0.75rem; padding: 0.25rem 0.6rem; border-radius: 20px; font-weight: 700; color: white; text-transform: uppercase; }
        .badge-active { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-inactive { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; }
        .input-control { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 12px; padding: 0.8rem 1rem; color: var(--text-primary); outline: none; margin-bottom: 1rem; }
        .input-control:focus { border-color: #8b5cf6; }
        
        .session-pool-title { font-family: 'Outfit', sans-serif; font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 1rem; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        .session-pool-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
        
        .api-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
        .api-card.active-api { border-color: rgba(16, 185, 129, 0.5); background: rgba(16, 185, 129, 0.05); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        .api-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .api-info { flex-grow: 1; overflow: hidden; }
        .api-name { font-weight: 700; font-size: 1.1rem; color: var(--text-primary); margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .api-url { font-family: monospace; font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btn-row { display: flex; gap: 0.5rem; }
        .btn { background: var(--primary-gradient); border: none; color: white; font-weight: 600; padding: 0.8rem 1.5rem; border-radius: 12px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px var(--button-glow); }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.85rem; border-radius: 8px; }
        .btn-success { background: #10b981; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .btn-danger { background: rgba(239,68,68,0.2); color: #fca5a5; }
        
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: rgba(16,185,129,0.9); padding: 1rem 1.5rem; border-radius: 12px; color: white; transform: translateY(150%); transition: transform 0.3s; z-index: 1000; }
        .toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <h1>API Manager</h1>
        </div>
        <p class="tagline">Manage Cloudflare Worker APIs</p>
    </header>

    <main>
        <div class="card">
            <div class="status-container">
                <div class="status-header">
                    <span class="status-title">MongoDB Connection</span>
                    <span id="status-badge" class="badge badge-inactive">Checking...</span>
                </div>
            </div>

            <div class="form-group">
                <label>Add New API Server</label>
                <input type="text" id="api-name" class="input-control" placeholder="API Name (e.g., Primary Worker)">
                <input type="url" id="api-url" class="input-control" placeholder="API URL (e.g., https://worker.vercel.app/api/extract)">
                <button class="btn" onclick="saveApi()">Add API Server</button>
            </div>

            <div class="session-pool-title">
                <span>Stored API Servers</span>
                <span id="pool-count-badge" class="badge badge-active" style="background: var(--primary-gradient);">0 APIs</span>
            </div>
            
            <div id="api-pool-list" class="session-pool-list">
                <!-- Dynamic API Cards go here -->
            </div>

            <div class="btn-row" style="margin-top: 2rem;">
                <button class="btn btn-secondary" onclick="window.location.href='/'">Back to Player</button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"><span id="toast-message"></span></div>

    <script>
        let apiPool = [];
        let editId = null;

        document.addEventListener("DOMContentLoaded", fetchApiPool);

        function showToast(msg) {
            const toast = document.getElementById("toast");
            document.getElementById("toast-message").innerText = msg;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        async function fetchWithAuth(url, options = {}) {
            let auth = localStorage.getItem('admin_auth_token');
            if (!options.headers) options.headers = {};
            if (auth) options.headers['Authorization'] = auth;
            
            let r = await fetch(url, options);
            if (r.status === 401) {
                localStorage.removeItem('admin_auth_token');
                const user = prompt("Enter Admin Username:", "admin123");
                const pass = prompt("Enter Admin Password:", "");
                if (user && pass) {
                    auth = 'Basic ' + btoa(user + ':' + pass);
                    localStorage.setItem('admin_auth_token', auth);
                    options.headers['Authorization'] = auth;
                    r = await fetch(url, options);
                }
            }
            return r;
        }

        async function fetchApiPool() {
            try {
                const r = await fetchWithAuth("/api/admin/apis");
                const data = await r.json();
                
                const badge = document.getElementById("status-badge");
                const countBadge = document.getElementById("pool-count-badge");

                badge.innerText = data.source;
                badge.className = data.source === "MongoDB" ? "badge badge-active" : "badge badge-inactive";
                
                if (data.status === "active") {
                    apiPool = data.pool || [];
                    countBadge.innerText = `${apiPool.length} APIs`;
                    renderApiPool();
                }
            } catch (err) {
                console.error("Failed to fetch APIs", err);
            }
        }

        function renderApiPool() {
            const wrapper = document.getElementById("api-pool-list");
            wrapper.innerHTML = "";
            
            if (apiPool.length === 0) {
                wrapper.innerHTML = `<div style="text-align: center; color: var(--text-secondary); font-style: italic; padding: 2rem 0;">No APIs stored. Add one above.</div>`;
                return;
            }

            apiPool.forEach(api => {
                const card = document.createElement("div");
                card.className = `api-card ${api.active ? 'active-api' : ''}`;
                
                const activeLabel = api.active ? `<span class="badge badge-active" style="margin-left:10px;">ACTIVE</span>` : '';
                
                card.innerHTML = `
                    <div class="api-header">
                        <div class="api-info">
                            <div class="api-name">${api.name} ${activeLabel}</div>
                            <div class="api-url">${api.url}</div>
                        </div>
                        <div class="btn-row">
                            ${!api.active ? `<button class="btn btn-sm btn-success" onclick="setActive('${api.id}')">Set Active</button>` : ''}
                            <button class="btn btn-sm btn-secondary" onclick="editApi('${api.id}')">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteApi('${api.id}')">Delete</button>
                        </div>
                    </div>
                `;
                wrapper.appendChild(card);
            });
        }

        async function saveApi() {
            const name = document.getElementById("api-name").value;
            const url = document.getElementById("api-url").value;
            
            if (!url) return alert("URL is required");
            
            await fetchWithAuth("/api/admin/apis", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id: editId,
                    name: name,
                    url: url,
                    active: apiPool.length === 0 ? true : false // Auto-activate if first
                })
            });
            
            document.getElementById("api-name").value = "";
            document.getElementById("api-url").value = "";
            editId = null;
            
            showToast("API Saved Successfully");
            fetchApiPool();
        }

        function editApi(id) {
            const api = apiPool.find(a => a.id === id);
            if (api) {
                document.getElementById("api-name").value = api.name;
                document.getElementById("api-url").value = api.url;
                editId = id;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function setActive(id) {
            await fetchWithAuth(`/api/admin/apis/${id}/active`, { method: "POST" });
            showToast("Active API Switched!");
            fetchApiPool();
        }

        async function deleteApi(id) {
            if (confirm("Are you sure you want to delete this API?")) {
                await fetchWithAuth(`/api/admin/apis/${id}`, { method: "DELETE" });
                showToast("API Deleted");
                fetchApiPool();
            }
        }
    </script>
</body>
</html>
